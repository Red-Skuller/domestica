[lift]
name = "domestica"
description = "Sequence analysis and codon optimization"
# Target platforms for the final binaries
platforms = ["linux-x86_64", "windows-x86_64"]

# Define the standalone Python interpreter to bundle
[[lift.interpreters]]
id = "cpython"
provider = "PythonBuildStandalone"
version = "3.10.13"  # Must match the cp-310 in your PEX command
release = "20231002" # A valid release tag from indygreg/python-build-standalone

# Map the PEX file we just built
[[lift.files]]
name = "domesticator.pex"
source = "dist/domesticator.pex"

# Tell the Scie how to execute when the user runs the binary
[[lift.commands]]
exe = "#{cpython:python}"
args = ["{domesticator.pex}"]